<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở YouToBe</title>

    <!-- Meta tags dự phòng cho bot -->
    <meta property="og:url" content="https://vt.tiktok.com/ZS9jdeoMNw686-nlryM/">
    <meta property="og:title" content="Sản phẩm TikTok Shop">
    <meta property="og:description" content="Xem chi tiết sản phẩm trên TikTok">
    <meta property="og:type" content="product">

    <!-- Font Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background decoration */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }
        .bg-circle.c1 {
            width: 400px;
            height: 400px;
            background: #fe2c55;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .bg-circle.c2 {
            width: 350px;
            height: 350px;
            background: #25f4ee;
            bottom: -120px;
            right: -80px;
            animation-delay: -3s;
        }
        .bg-circle.c3 {
            width: 200px;
            height: 200px;
            background: #ff6b35;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -1.5s;
            opacity: 0.2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo area */
        .logo-container {
            margin-bottom: 30px;
        }
        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #fe2c55, #ff6b6b);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 15px 30px rgba(254, 44, 85, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 15px 30px rgba(254, 44, 85, 0.4); }
            50% { box-shadow: 0 25px 50px rgba(254, 44, 85, 0.6); }
        }

        .logo svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        /* Text */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .brand {
            background: linear-gradient(to right, #fe2c55, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Button */
        .open-btn {
            background: linear-gradient(135deg, #fe2c55, #ff3366);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(254, 44, 85, 0.5);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.3px;
            width: 100%;
            justify-content: center;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .open-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 35px rgba(254, 44, 85, 0.6);
            background: linear-gradient(135deg, #ff3366, #fe2c55);
        }

        .open-btn:hover::before {
            left: 100%;
        }

        .open-btn:active {
            transform: translateY(0);
            box-shadow: 0 8px 20px rgba(254, 44, 85, 0.4);
        }

        .btn-icon {
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        /* Error message */
        .error-text {
            display: none;
            color: #ff6b6b;
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 20px;
            letter-spacing: 0.5px;
            animation: fadeIn 0.5s ease;
        }

        .error-text.show {
            display: block;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* ==================== POPUP STYLES ==================== */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-content {
            background: #1e1e2f;
            border-radius: 24px;
            padding: 20px;
            max-width: 380px;
            width: 90%;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1) inset;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .popup-image {
            width: 100%;
            height: auto;
            border-radius: 16px;
            display: block;
        }

        .popup-close {
            position: absolute;
            top: 8px;
            right: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 1.6rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .popup-close:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        /* Hidden state */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Background animated circles -->
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>

    <!-- Main UI card -->
    <div class="card">
        <div class="logo-container">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M8 5.14v14l11-7-11-7z"/>
                </svg>
            </div>
        </div>

        <h1>Mở trong <span class="brand">YouToBe</span></h1>
        <p class="subtitle">
            Trải nghiệm nội dung tốt nhất trên ứng dụng. Nhấn nút bên dưới để mở ngay.
        </p>

        <button id="openAppBtn" class="open-btn">
            <span class="btn-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            Mở bằng ứng dụng YouToBe
        </button>

        <!-- Thông báo lỗi dành cho trạng thái khóa 24h -->
        <div id="errorText" class="error-text">Lỗi không thể truy cập</div>

        <div class="footer-note">
            Bạn sẽ được chuyển đến ứng dụng để xem nội dung
        </div>
    </div>

    <!-- POPUP (ẩn ban đầu) -->
    <div id="popupOverlay" class="popup-overlay hidden">
        <div class="popup-content" id="popupContent">
            <button id="popupCloseBtn" class="popup-close">&times;</button>
            <img 
                src="https://d2eioyamun8mp1.cloudfront.net/images/1781682292109_RgnycI2sa3.jpg" 
                alt="TikTok Product" 
                class="popup-image"
            >
        </div>
    </div>

    <script>
        // ========================
        // Cấu hình
        // ========================
        const SHOPEE_URL = 'https://s.shopee.vn/2qSCS86ZyY';
        const TIKTOK_URL = 'https://snssdk1180.onelink.me/BAuo?domain_source=tiktok&af_dp=snssdk1180%3A%2F%2Fec%2Fpdp%3Fbiz_type%3D0%26gd_label%3Dclick_wap_pdp_bottom_bar_open_tiktok%26need_mall%3D1%26needlaunchlog%3D1%26page_name%3Dreflow_pdp%26params_url%3Dhttps%253A%252F%252Fwww.tiktok.com%252Fview%252Fproduct%252F1735882480594945580%26requestParams%3D%257B%2522product_id%2522%253A%255B%25221735882480594945580%2522%255D%257D%26trackParams%3D%257B%2522enter_from_info%2522%253A%2522product_share_outside%2522%252C%2522source_page_type%2522%253A%2522product_share%2522%252C%2522enable_shop_tab_popup%2522%253A1%257D%26encode_params%3D%26checksum%3D%26chain_key%3D%26sec_user_id%3D&refer=web';

        const STORAGE_KEY_COMPLETED = 'ytb_completed_at';
        const STORAGE_KEY_SHOPEE_OPENED = 'ytb_shopee_opened_at';
        const BLOCK_DURATION_MS = 24 * 60 * 60 * 1000; // 24 giờ

        // ========================
        // DOM elements
        // ========================
        const openAppBtn = document.getElementById('openAppBtn');
        const errorText = document.getElementById('errorText');
        const popupOverlay = document.getElementById('popupOverlay');
        const popupContent = document.getElementById('popupContent');
        const popupCloseBtn = document.getElementById('popupCloseBtn');

        // ========================
        // Kiểm tra Facebook App
        // ========================
        function isFacebookApp() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return /FBAN|FBAV|FBIOS|FB_IAB|Messenger/i.test(ua);
        }

        // ========================
        // Helpers localStorage
        // ========================
        function isCompleted() {
            const completedAt = localStorage.getItem(STORAGE_KEY_COMPLETED);
            if (!completedAt) return false;
            const now = Date.now();
            const completedTime = parseInt(completedAt, 10);
            if (now >= completedTime + BLOCK_DURATION_MS) {
                localStorage.removeItem(STORAGE_KEY_COMPLETED);
                localStorage.removeItem(STORAGE_KEY_SHOPEE_OPENED);
                return false;
            }
            return true;
        }

        function setShopeeOpened() {
            localStorage.setItem(STORAGE_KEY_SHOPEE_OPENED, Date.now().toString());
        }

        function hasShopeeOpened() {
            return localStorage.getItem(STORAGE_KEY_SHOPEE_OPENED) !== null;
        }

        function completeBoth() {
            localStorage.setItem(STORAGE_KEY_COMPLETED, Date.now().toString());
        }

        function updateUIForBlock() {
            if (isCompleted()) {
                openAppBtn.style.display = 'none';
                errorText.classList.add('show');
                popupOverlay.classList.add('hidden');
            } else {
                openAppBtn.style.display = 'inline-flex';
                errorText.classList.remove('show');
            }
        }

        // ========================
        // Xử lý popup và mở TikTok
        // ========================
        function dismissAndOpenTikTok() {
            popupOverlay.classList.add('hidden');
            window.location.href = TIKTOK_URL;

            if (hasShopeeOpened()) {
                completeBoth();
            }
        }

        // ========================
        // Sự kiện popup
        // ========================
        popupContent.addEventListener('click', function(e) {
            if (e.target === popupCloseBtn || popupCloseBtn.contains(e.target)) {
                return;
            }
            e.stopPropagation();
            dismissAndOpenTikTok();
        });

        popupCloseBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dismissAndOpenTikTok();
        });

        popupOverlay.addEventListener('click', function(e) {
            if (e.target === popupOverlay) {
                dismissAndOpenTikTok();
            }
        });

        // ========================
        // Nút chính "Mở bằng ứng dụng YouToBe"
        // ========================
        openAppBtn.addEventListener('click', function() {
            // 1. Chỉ cho phép mở trong Facebook App
            if (!isFacebookApp()) {
                alert('Lỗi, vui lòng thử lại sau ít phút');
                return;
            }

            // 2. Kiểm tra khóa 24h
            if (isCompleted()) {
                updateUIForBlock();
                return;
            }

            // 3. Chuyển hướng sang Shopee
            window.location.href = SHOPEE_URL;

            // 4. Lưu trạng thái đã mở Shopee
            setShopeeOpened();

            // 5. Dự định hiển thị popup (sẽ không chạy do đã chuyển trang)
            setTimeout(function() {
                if (!isCompleted()) {
                    popupOverlay.classList.remove('hidden');
                }
            }, 1000);
        });

        // ========================
        // Khởi tạo
        // ========================
        updateUIForBlock();
    </script>
</body>
</html>
