<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở ứng dụng YouToBe</title>

    <!-- Meta tags dự phòng cho bot -->
    <meta property="og:url" content="https://vt.tiktok.com/ZS9jdeoMNw686-nlryM/">
    <meta property="og:title" content="Sản phẩm TikTok Shop">
    <meta property="og:description" content="Xem chi tiết sản phẩm trên TikTok">
    <meta property="og:type" content="product">

    <!-- Font Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background decoration */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }
        .bg-circle.c1 {
            width: 400px;
            height: 400px;
            background: #fe2c55;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .bg-circle.c2 {
            width: 350px;
            height: 350px;
            background: #25f4ee;
            bottom: -120px;
            right: -80px;
            animation-delay: -3s;
        }
        .bg-circle.c3 {
            width: 200px;
            height: 200px;
            background: #ff6b35;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -1.5s;
            opacity: 0.2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo area */
        .logo-container {
            margin-bottom: 30px;
        }
        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #fe2c55, #ff6b6b);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 15px 30px rgba(254, 44, 85, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 15px 30px rgba(254, 44, 85, 0.4); }
            50% { box-shadow: 0 25px 50px rgba(254, 44, 85, 0.6); }
        }

        .logo svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        /* Text */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .brand {
            background: linear-gradient(to right, #fe2c55, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Button */
        .open-btn {
            background: linear-gradient(135deg, #fe2c55, #ff3366);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(254, 44, 85, 0.5);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.3px;
            width: 100%;
            justify-content: center;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .open-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 35px rgba(254, 44, 85, 0.6);
            background: linear-gradient(135deg, #ff3366, #fe2c55);
        }

        .open-btn:hover::before {
            left: 100%;
        }

        .open-btn:active {
            transform: translateY(0);
            box-shadow: 0 8px 20px rgba(254, 44, 85, 0.4);
        }

        .btn-icon {
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        /* Footer note */
        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 40px 25px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background animated circles -->
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>

    <!-- Main UI card -->
    <div class="card">
        <div class="logo-container">
            <div class="logo">
                <!-- Play icon inside logo -->
                <svg viewBox="0 0 24 24">
                    <path d="M8 5.14v14l11-7-11-7z"/>
                </svg>
            </div>
        </div>

        <h1>Mở trong <span class="brand">YouToBe</span></h1>
        <p class="subtitle">
            Trải nghiệm nội dung tốt nhất trên ứng dụng. Nhấn nút bên dưới để mở ngay.
        </p>

        <button id="openAppBtn" class="open-btn">
            <span class="btn-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            Mở bằng ứng dụng YouToBe
        </button>

        <div class="footer-note">
            Bạn sẽ được chuyển đến ứng dụng để xem nội dung
        </div>
    </div>

    <script>
        // ========================
        // Yêu cầu mới (không sửa giao diện, chỉ thêm logic)
        // 1. Chỉ mở link khi đang dùng Facebook App
        // 2. Mỗi người dùng chỉ mở link 1 lần, reset sau 3 tiếng (dùng localStorage)
        // ========================
        
        const LINK_URL = 'https://s.shopee.vn/2qSCS86ZyY';
        const STORAGE_KEY = 'youToBe_link_expiry';
        const THREE_HOURS_MS = 3 * 60 * 60 * 1000;

        // Kiểm tra có đang mở trong Facebook App không (in-app browser)
        function isFacebookApp() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            // Các dấu hiệu phổ biến của Facebook in-app browser
            return /FBAN|FBAV|FBIOS|FB_IAB|Messenger/i.test(ua);
        }

        // Kiểm tra xem đã hết thời gian chờ chưa (block hay không)
        function isLinkBlocked() {
            const expiry = localStorage.getItem(STORAGE_KEY);
            if (!expiry) return false;
            
            const now = Date.now();
            const expiryTime = parseInt(expiry, 10);
            
            // Nếu đã quá hạn -> xóa key và không block
            if (now >= expiryTime) {
                localStorage.removeItem(STORAGE_KEY);
                return false;
            }
            // Vẫn còn hiệu lực -> bị block
            return true;
        }

        // Ghi nhận thời điểm người dùng vừa mở link, block trong 3 giờ kể từ bây giờ
        function setBlockUntilNext3Hours() {
            const expiryTime = Date.now() + THREE_HOURS_MS;
            localStorage.setItem(STORAGE_KEY, expiryTime.toString());
        }

        // Xử lý khi nhấn nút
        function handleOpenLink() {
            // 1. Kiểm tra: chỉ mở được khi dùng Facebook App
            if (!isFacebookApp()) {
                alert(' Đã có lỗi.\nVui lòng mở lại sau.');
                return;
            }

            // 2. Kiểm tra xem đã bấm mở link trong 3 tiếng gần đây chưa
            if (isLinkBlocked()) {
                alert('lỗi.\nVui lòng mở lại sau.');
                return;
            }

            // 3. Hợp lệ: chặn các lần nhấn tiếp theo trong 3h và chuyển hướng
            setBlockUntilNext3Hours();
            window.location.href = LINK_URL;
        }

        // Gắn sự kiện cho nút (giữ nguyên các hiệu ứng UI, chỉ thay logic)
        const btn = document.getElementById('openAppBtn');
        // Xóa listener cũ nếu có (trong code hiện tại chỉ có 1, nhưng gán lại để chắc chắn)
        if (btn) {
            // Loại bỏ mọi listener cũ (nếu có) trước khi thêm mới
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener('click', handleOpenLink);
        }
    </script>
</body>
</html>
